name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - run: uvx ruff check .
      - run: uvx ruff format --check .

  r:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: r
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - run: Rscript -e 'install.packages(c("lintr", "styler"))'
      - run: Rscript -e 'if (length(lintr::lint_dir("src")) > 0) stop("linting failed")'
      - run: Rscript -e 'styler::style_dir("src", dry = "fail")'
